# hyprlock — TokyoNight, blurred wallpaper, centered clock + password. macOS lock feel.
source = ~/.config/hypr/hyprlock-colors.conf

background {
    monitor =
    path = ~/Pictures/Wallpapers/tokyonight.jpg
    blur_passes = 3
    blur_size = 6
    brightness = 0.7
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = $blue
    inner_color = $bg
    font_color = $fg
    check_color = $purple
    fail_color = $red
    placeholder_text = <span foreground="##565f89">Password</span>
    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = CaskaydiaCove Nerd Font
    color = $fg
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 18
    font_family = CaskaydiaCove Nerd Font
    color = $comment
    position = 0, 20
    halign = center
    valign = center
}
