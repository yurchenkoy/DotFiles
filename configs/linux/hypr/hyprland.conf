# Nvidia-specific environment
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = XDG_CURRENT_DESKTOP,Hyprland

# SSH agent socket (systemd-user ssh-agent.service). Set here so GUI apps launched
# by Hyprland — notably KeePassXC, which loads the git signing key into this agent
# on unlock — and all terminals/git see the same socket.
env = SSH_AUTH_SOCK,/run/user/1000/ssh-agent.socket

# Remap Caps Lock to Hyper
input {
    kb_layout = abc,no
    kb_options = caps:hyper,grp:shifts_toggle
    follow_mouse = 0
}

# Modifier: Caps Lock is now Mod3 (Hyper)
$hyper = Mod3

# TokyoNight palette (generated by theme-apply; provides $blue, $purple, $bg, etc.)
source = ~/.config/hypr/colors.conf

# Accordion behavior: keep focus-cycling while a window is fullscreen, so
# Caps+F blows a tile up and Caps+h/j/k/l swaps through the rest, each
# staying fullscreen — like aerospace's accordion.
binds {
    movefocus_cycles_fullscreen = true
}

# Instant workspace switching preserved; other animations get snappy easing.
animations {
    enabled = true
    bezier = snappy, 0.22, 1, 0.36, 1          # easeOutQuint-ish
    animation = workspaces, 0                   # KEEP INSTANT
    animation = windows, 1, 3, snappy, popin 6%
    animation = windowsOut, 1, 3, snappy, popin 6%
    animation = fade, 1, 3, snappy
    animation = border, 1, 4, snappy
}

# Restrained, mac-like looks. Colors from sourced colors.conf.
# (rounding lives under decoration{} in this Hyprland version, not general{}.)
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = $blue $purple 45deg
    col.inactive_border = $bg_dark
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 4
        passes = 2
    }
    # Inactive-window dimming so focus pops (mirrors terminal-opacity restraint).
    dim_inactive = true
    dim_strength = 0.12
}

# Input/focus: stop cursor warping to newly focused tile; focus changes only on click.
cursor {
    no_warps = true
}

# Focus — Caps + h/j/k/l
bind = $hyper, h, movefocus, l
bind = $hyper, l, movefocus, r
bind = $hyper, k, movefocus, u
bind = $hyper, j, movefocus, d

# Move window — Caps + Super + h/j/k/l
# moveWINDOWorgroup = like movewindow, but pushing a window into a group MERGES
# it in (so you can collect already-open tiles into a group; see Caps+, below).
bind = $hyper SUPER, h, movewindoworgroup, l
bind = $hyper SUPER, l, movewindoworgroup, r
bind = $hyper SUPER, k, movewindoworgroup, u
bind = $hyper SUPER, j, movewindoworgroup, d

# Workspaces — Caps + 1-9
bind = $hyper, 1, workspace, 1
bind = $hyper, 2, workspace, 2
bind = $hyper, 3, workspace, 3
bind = $hyper, 4, workspace, 4
bind = $hyper, 5, workspace, 5
bind = $hyper, 6, workspace, 6
bind = $hyper, 7, workspace, 7
bind = $hyper, 8, workspace, 8
bind = $hyper, 9, workspace, 9

# Move window to workspace — Caps + Super + 1-9
bind = $hyper SUPER, 1, movetoworkspacesilent,1
bind = $hyper SUPER, 2, movetoworkspacesilent,2
bind = $hyper SUPER, 3, movetoworkspacesilent,3
bind = $hyper SUPER, 4, movetoworkspacesilent,4
bind = $hyper SUPER, 5, movetoworkspacesilent,5
bind = $hyper SUPER, 6, movetoworkspacesilent,6
bind = $hyper SUPER, 7, movetoworkspacesilent,7
bind = $hyper SUPER, 8, movetoworkspacesilent,8
bind = $hyper SUPER, 9, movetoworkspacesilent,9

# App launcher — Super + Space
bind = SUPER, Space, exec, wofi --show drun

# Terminal — Hyper+Return
bind = $hyper, Return, exec, ghostty

# Kill window — Super+Q (window), Super+W (mac "close": closes terminal windows;
# in GUI apps xremap rewrites Super+W → Ctrl+W before this bind, so it = close tab there)
bind = SUPER, Q, killactive
bind = SUPER, W, killactive

# ── Layout / window state (Caps + key) — mirrors aerospace main mode ──────
bind = $hyper, slash, layoutmsg, togglesplit    # flip dwindle split dir for next window
bind = $hyper, comma, togglegroup,              # merge/dissolve a tabbed group (accordion-ish)
bind = $hyper, F, fullscreen,                   # fullscreen (accordion: see movefocus cycling below)

# ── Quick resize (Caps + -/=) — single binds, no resize *mode* ───────────
bind = $hyper, minus, resizeactive, -50 -50
bind = $hyper, equal, resizeactive, 50 50

# ── Group tab cycling (Caps + [ / ]) — for togglegroup stacks ─────────────
bind = $hyper, bracketleft,  changegroupactive, b
bind = $hyper, bracketright, changegroupactive, f
bind = $hyper SUPER, comma, moveoutofgroup       # pop focused window back out of its group

# ── Monitors ──────────────────────────────────────────────────────────────
bind = $hyper, grave, movecurrentworkspacetomonitor, +1    # move workspace to next monitor

# ── macOS-style app shortcuts that collide with Caps+Super window mgmt ──
# These live here (not xremap) so the compositor can tell Super+key apart from
# Caps+Super+key (Hyper+Super). sendshortcut forwards Ctrl+key to the focused app.
#   Super+L      → Ctrl+L  (focus address bar / clear in terminal)
#   Super+1..9   → Ctrl+1..9 (browser tab switching)
bind = SUPER, L, sendshortcut, CTRL, L, activewindow
# Tab switching → Alt+1..9.  ⚠️ BROWSER-DEPENDENT: this Firefox uses Alt+number
# (not the standard Ctrl+number) for tabs. If you switch browsers, change ALT→CTRL.
bind = SUPER, 1, sendshortcut, ALT, 1, activewindow
bind = SUPER, 2, sendshortcut, ALT, 2, activewindow
bind = SUPER, 3, sendshortcut, ALT, 3, activewindow
bind = SUPER, 4, sendshortcut, ALT, 4, activewindow
bind = SUPER, 5, sendshortcut, ALT, 5, activewindow
bind = SUPER, 6, sendshortcut, ALT, 6, activewindow
bind = SUPER, 7, sendshortcut, ALT, 7, activewindow
bind = SUPER, 8, sendshortcut, ALT, 8, activewindow
bind = SUPER, 9, sendshortcut, ALT, 9, activewindow

# Autostart
# xremap as a Hyprland child: inherits HYPRLAND_INSTANCE_SIGNATURE + WAYLAND_DISPLAY
# so its app-aware (terminal-excluded) remapping works, and it's live the moment
# the session starts — no systemd graphical-session.target needed. --watch handles
# the Bluetooth keyboard re-appearing as a new device on reconnect.
exec-once = /usr/local/bin/xremap --watch=config,device /home/yuy/.config/xremap/config.yml
exec-once = waybar
exec-once = mako
exec-once = hyprpaper
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
