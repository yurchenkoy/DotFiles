; tokyodark.ini — Tokyo Dark+ palette for fast-syntax-highlighting
; Cross-referenced with nvim tokyo-dark-plus.lua colorscheme
;
; Palette mapping (nvim → zsh):
;   #7AA2F7  blue      → commands, builtins, aliases (shell convention)
;   #BB9AF7  purple    → reserved words, keywords (storage/modifier)
;   #F7768E  string    → quoted arguments
;   #ACCFD7  variable  → variables, substitutions, $vars in strings
;   #d4d4d4  operator  → operators, redirections, separators
;   #E5C07B  func      → globbing (distinct syntax element)
;   #9ECE6A  comment   → comments
;   #7DCFFF  constant  → constants, exec descriptors, here-strings
;   #b5cea8  number    → numeric literals
;   #D19A66  escape    → history expansion
;   #c0caf5  fg        → default text, options

[base]
default                          = none
unknown-token                    = none
reserved-word                    = #BB9AF7
subcommand                       = #BB9AF7
alias                            = #7AA2F7
suffix-alias                     = #7AA2F7
global-alias                     = #7AA2F7
builtin                          = #7AA2F7
function                         = #7AA2F7
command                          = #7AA2F7
precommand                       = #7AA2F7
hashed-command                   = #7AA2F7
commandseparator                 = #d4d4d4
path                             = #BB9AF7,underline
pathseparator                    = #d4d4d4
path-to-dir                      = #BB9AF7,underline
globbing                         = #E5C07B
globbing-ext                     = #E5C07B
history-expansion                = #D19A66
single-hyphen-option             = #c0caf5
double-hyphen-option             = #c0caf5
single-quoted-argument           = #F7768E
double-quoted-argument           = #F7768E
dollar-quoted-argument           = #F7768E
back-quoted-argument             = #ACCFD7
back-or-dollar-double-quoted-argument = #ACCFD7
assign                           = none
redirection                      = #d4d4d4
comment                          = #9ECE6A
variable                         = #ACCFD7
named-fd                         = #d4d4d4
numeric-fd                       = #d4d4d4
exec-descriptor                  = #7DCFFF
here-string-tri                  = #7DCFFF
here-string-text                 = none
here-string-var                  = #ACCFD7
secondary                        = free
case-input                       = #7AA2F7
case-parentheses                 = #d4d4d4
case-condition                   = #BB9AF7
correct-subtle                   = #9ECE6A
incorrect-subtle                 = #F7768E
subtle-separator                 = #565f89
subtle-bg                        = none
paired-bracket                   = none
bracket-level-1                  = #7AA2F7,bold
bracket-level-2                  = #BB9AF7,bold
bracket-level-3                  = #E5C07B,bold
single-sq-bracket                = #7AA2F7
double-sq-bracket                = #7AA2F7
double-paren                     = #d4d4d4
optarg-string                    = #F7768E
optarg-number                    = #b5cea8
recursive-base                   = #c0caf5
for-loop-variable                = #ACCFD7
for-loop-number                  = #b5cea8
for-loop-operator                = #d4d4d4
for-loop-separator               = #d4d4d4
assign-array-bracket             = #d4d4d4
mathvar                          = #ACCFD7
mathnum                          = #b5cea8
matherr                          = #F7768E

[command-point]
command                          = #7AA2F7
alias                            = #7AA2F7
builtin                          = #7AA2F7
function                         = #7AA2F7
reserved-word                    = #BB9AF7
